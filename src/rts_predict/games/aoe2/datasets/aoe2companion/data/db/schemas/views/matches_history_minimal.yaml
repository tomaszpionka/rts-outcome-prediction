columns:
- name: match_id
  type: VARCHAR
  nullable: true
  description: 'Cross-dataset unique match identifier. Format: ''<dataset_tag>::<native_id>''.
    For aoe2companion: ''aoe2companion::<decimal-matchId>''. Provenance: numeric-tail
    regex [0-9]+ cites matches_raw.yaml line `matchId: INTEGER` (I7).'
  notes: IDENTITY. Prefix applied in DDL only; upstream matchId unchanged (I9).
- name: started_at
  type: TIMESTAMP
  nullable: true
  description: Match start time. TIMESTAMP (no TZ) -- pass-through from matches_raw.started
    (already TIMESTAMP per matches_raw.yaml).
  notes: CONTEXT. Temporal anchor for Phase 02 rating-update loops.
- name: player_id
  type: VARCHAR
  nullable: true
  description: 'Focal player identifier. aoe2companion: CAST(profileId AS VARCHAR)
    (INTEGER -> VARCHAR).'
  notes: IDENTITY.
- name: opponent_id
  type: VARCHAR
  nullable: true
  description: Opposing player identifier. Same grain and provenance as player_id.
  notes: IDENTITY.
- name: faction
  type: VARCHAR
  nullable: true
  description: 'Focal player''s faction. Per-dataset polymorphic vocabulary. aoe2companion:
    full civilization names (zero NULLs upstream). CONSUMERS MUST NOT treat faction
    as single categorical across datasets.'
  notes: PRE_GAME. Raw civ vocabulary. Polymorphic I8 contract. Zero NULLs.
- name: opponent_faction
  type: VARCHAR
  nullable: true
  description: Opposing player's faction (same per-dataset vocabulary as `faction`).
  notes: PRE_GAME. Mirror of faction from the opponent row. Zero NULLs.
- name: won
  type: BOOLEAN
  nullable: true
  description: TRUE if the focal player won, FALSE otherwise. Complementary between
    the 2 rows.
  notes: TARGET. Prediction label for downstream experiments. Zero NULLs.
- name: duration_seconds
  type: BIGINT
  nullable: true
  description: 'Match duration in seconds (POST_GAME_HISTORICAL). For aoe2companion:
    CAST(EXTRACT(EPOCH FROM (r.finished - r.started)) AS BIGINT). EXTRACT(EPOCH FROM)
    is standard DuckDB function returning DOUBLE seconds. CAST AS BIGINT truncates
    (no rounding). NULL if r.finished IS NULL (abandoned/crashed matches -- verified
    by Gate +6 NULL fraction <= 1%). Both rows of a match have identical duration_seconds
    (symmetric -- self-join propagates same value). I7: EXTRACT(EPOCH FROM) is standard
    DuckDB -- no magic constant (per R1-WARNING-A5 verification). Derivation note
    (A-D3): wall-clock duration (finished - started); no in-game duration column available
    in aoec.'
  notes: 'POST_GAME_HISTORICAL. Available only after match end. DO NOT use as PRE_GAME
    feature for predicting match T outcome (I3 violation). Useful for retrospective
    analysis: rating-update weighting, learning-curve measurement, game-length-conditioned
    BTL. Phase 02 feature extractors that drop POST_GAME_HISTORICAL tokens will auto-exclude.
    Unit: seconds (canonical cross-dataset unit). Source: EXTRACT(EPOCH FROM (matches_raw.finished
    - matches_raw.started)). Cross-dataset I7 provenance: sc2egset 22.4 loops/sec;
    aoestats /1e9 nanoseconds; aoec EXTRACT EPOCH (this dataset).'
- name: dataset_tag
  type: VARCHAR
  nullable: false
  description: Dataset discriminator for UNION ALL across sibling datasets. Constant
    'aoe2companion' in this TABLE.
  notes: IDENTITY. Matches the prefix before '::' in match_id.
provenance:
  source_tables:
  - matches_raw
  source_note: 'Reads from matches_raw directly (not matches_1v1_clean VIEW) due to
    DuckDB 1.5.1 bug. ADDENDUM: duration_seconds derived from r.finished - r.started
    (in _mhm_base staging; no additional JOIN required).'
  join_key: self-join on 'aoe2companion::' || CAST(matchId AS VARCHAR); player_id
    = CAST(profileId AS VARCHAR).
  filter: internalLeaderboardId IN (6, 18); profileId != -1; deduplicated; R03 complementarity.
  scope: 30,531,196 true 1v1 decisive matches, 61,062,392 player-rows.
  created_by: sandbox/aoe2/aoe2companion/01_exploration/04_cleaning/01_04_03_minimal_history_view.py

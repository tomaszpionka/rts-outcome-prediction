step: '01_04_03'
schema_version: '9-col (ADDENDUM: duration_seconds added 2026-04-18)'
row_count: 35629894
describe_artifact: src/rts_predict/games/aoe2/datasets/aoestats/reports/artifacts/01_exploration/04_cleaning/01_04_03_minimal_history_view.json

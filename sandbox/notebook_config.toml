[cells]
# Maximum lines per notebook cell. Matches python-code.md "Max ~50 lines per function".
# Enforced as a documented convention. An AST-based reviewer check is planned.
max_lines = 50

[execution]
# Default timeout in seconds for fresh-kernel nbconvert execution.
# Justified by early exploration (~2 min on M4 Max 36 GB) * 5x safety margin.
# Update after measuring proof-of-concept.
timeout_seconds = 600
